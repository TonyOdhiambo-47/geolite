<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#141414" />
    <meta
      name="description"
      content="Browser Euclidean geometry. Compass and straightedge constructions in your browser. No account. Works offline."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Sora:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>GeoLite. Geometry that works.</title>
  </head>
  <body>
    <aside class="toolbar" id="toolbar">
      <a class="mark" href="https://mwendo.co" aria-label="Mwendo">
        <svg viewBox="0 0 28 28" class="mark-svg"><rect width="28" height="28" rx="7" fill="#00c853"/><text x="14" y="19" text-anchor="middle" font-family="Sora, sans-serif" font-weight="700" font-size="14" fill="#001b08">G</text></svg>
      </a>
      <div class="tools" role="toolbar" aria-label="Construction tools">
        <button class="tool is-active" data-tool="select" title="Select and drag (V)" data-key="V">
          <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M4 3 L4 16 L8 12 L11 17 L13 16 L10 11 L15 11 Z" fill="currentColor"/></svg>
        </button>
        <button class="tool" data-tool="point" title="Point (P)" data-key="P">
          <svg viewBox="0 0 20 20" aria-hidden="true"><circle cx="10" cy="10" r="3.5" fill="currentColor"/></svg>
        </button>
        <button class="tool" data-tool="segment" title="Segment (S)" data-key="S">
          <svg viewBox="0 0 20 20" aria-hidden="true"><line x1="4" y1="16" x2="16" y2="4" stroke="currentColor" stroke-width="1.6"/><circle cx="4" cy="16" r="1.5" fill="currentColor"/><circle cx="16" cy="4" r="1.5" fill="currentColor"/></svg>
        </button>
        <button class="tool" data-tool="line" title="Line (L)" data-key="L">
          <svg viewBox="0 0 20 20" aria-hidden="true"><line x1="1" y1="18" x2="19" y2="2" stroke="currentColor" stroke-width="1.6"/></svg>
        </button>
        <button class="tool" data-tool="circle" title="Circle (C)" data-key="C">
          <svg viewBox="0 0 20 20" aria-hidden="true"><circle cx="10" cy="10" r="6" fill="none" stroke="currentColor" stroke-width="1.6"/><circle cx="10" cy="10" r="1.5" fill="currentColor"/></svg>
        </button>
        <div class="tool-sep"></div>
        <button class="tool" data-tool="intersect" title="Intersection (I)" data-key="I">
          <svg viewBox="0 0 20 20" aria-hidden="true"><line x1="2" y1="5" x2="18" y2="15" stroke="currentColor" stroke-width="1.2"/><line x1="2" y1="15" x2="18" y2="5" stroke="currentColor" stroke-width="1.2"/><circle cx="10" cy="10" r="2.2" fill="currentColor"/></svg>
        </button>
        <button class="tool" data-tool="midpoint" title="Midpoint (M)" data-key="M">
          <svg viewBox="0 0 20 20" aria-hidden="true"><line x1="2" y1="10" x2="18" y2="10" stroke="currentColor" stroke-width="1.2"/><circle cx="2" cy="10" r="1.3" fill="currentColor"/><circle cx="18" cy="10" r="1.3" fill="currentColor"/><circle cx="10" cy="10" r="2.3" fill="currentColor" stroke="none"/></svg>
        </button>
        <button class="tool" data-tool="perp_bis" title="Perpendicular bisector (B)" data-key="B">
          <svg viewBox="0 0 20 20" aria-hidden="true"><line x1="2" y1="14" x2="18" y2="14" stroke="currentColor" stroke-width="1.2"/><line x1="10" y1="2" x2="10" y2="18" stroke="currentColor" stroke-width="1.4"/></svg>
        </button>
        <button class="tool" data-tool="ang_bis" title="Angle bisector (A)" data-key="A">
          <svg viewBox="0 0 20 20" aria-hidden="true"><line x1="4" y1="16" x2="17" y2="5" stroke="currentColor" stroke-width="1.2"/><line x1="4" y1="16" x2="17" y2="16" stroke="currentColor" stroke-width="1.2"/><line x1="4" y1="16" x2="16" y2="10" stroke="currentColor" stroke-width="1.4" stroke-dasharray="2 2"/></svg>
        </button>
        <div class="tool-sep"></div>
        <button class="tool" id="btn-undo" title="Undo (Ctrl+Z)">
          <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M5 10 L5 6 L10 10 L5 14 Z M5 10 Q10 10 14 12 T18 14" fill="currentColor"/></svg>
        </button>
        <button class="tool" id="btn-redo" title="Redo (Ctrl+Shift+Z)">
          <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M15 10 L15 6 L10 10 L15 14 Z M15 10 Q10 10 6 12 T2 14" fill="currentColor"/></svg>
        </button>
      </div>
      <div class="tools footer-tools">
        <button class="tool" id="btn-template" title="Templates">
          <svg viewBox="0 0 20 20" aria-hidden="true"><rect x="3" y="3" width="6" height="6" fill="none" stroke="currentColor" stroke-width="1.2"/><rect x="11" y="3" width="6" height="6" fill="none" stroke="currentColor" stroke-width="1.2"/><rect x="3" y="11" width="6" height="6" fill="none" stroke="currentColor" stroke-width="1.2"/><rect x="11" y="11" width="6" height="6" fill="currentColor"/></svg>
        </button>
        <button class="tool" id="btn-save" title="Save as JSON">
          <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M4 3 H14 L17 6 V17 H4 Z" fill="none" stroke="currentColor" stroke-width="1.4"/><rect x="7" y="10" width="6" height="5" fill="currentColor"/></svg>
        </button>
        <button class="tool" id="btn-load" title="Load JSON">
          <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M3 6 H8 L10 4 H17 V16 H3 Z" fill="none" stroke="currentColor" stroke-width="1.4"/></svg>
        </button>
        <button class="tool" id="btn-png" title="Export PNG">
          <svg viewBox="0 0 20 20" aria-hidden="true"><rect x="3" y="3" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.4"/><circle cx="7" cy="7" r="1.5" fill="currentColor"/><path d="M3 14 L7 10 L12 14 L17 9" stroke="currentColor" stroke-width="1.4" fill="none"/></svg>
        </button>
        <button class="tool" id="btn-clear" title="Clear">
          <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M5 5 L15 15 M15 5 L5 15" stroke="currentColor" stroke-width="1.6"/></svg>
        </button>
      </div>
    </aside>

    <main class="stage">
      <canvas id="canvas"></canvas>
      <div class="hud" id="hud"></div>
    </main>

    <dialog id="tpl-dialog" class="tpl-dialog">
      <div class="tpl-head">
        <h2>templates</h2>
        <button class="tpl-close" id="tpl-close">close</button>
      </div>
      <div class="tpl-grid" id="tpl-grid"></div>
    </dialog>

    <input type="file" id="file-input" accept="application/json" hidden />

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
